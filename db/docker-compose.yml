services:
  database:
    image: postgres:15-alpine
    container_name: cloud_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: geheim_nas_password
      POSTGRES_DB: cloud_db
    # Port 5432 lassen wir nur lokal offen (oder ganz zu), 
    # da nur das Backend mit der DB sprechen muss.
    ports:
      - "5432:5432" 
    volumes:
      - ./data:/var/lib/postgresql/data