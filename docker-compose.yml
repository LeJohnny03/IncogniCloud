version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: incognicloud_database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Port 5432 lassen wir nur lokal offen (oder ganz zu), 
    # da nur das Backend mit der DB sprechen muss.
    ports:
      - "5432:5432" 
    volumes:
      - ./db/proddata:/var/lib/postgresql/data
    networks:
      - incognicloud-network

  backend:
    build: 
      context: ./backend
    container_name: incognicloud_backend
    restart: always
    environment:
      # Hier referenzieren wir den Datenbank-Container über den Netzwerknamen
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: database 
      DB_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - incognicloud-network

  frontend:
    build:
      context: ./frontend
    container_name: incognicloud_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # SvelteKit muss wissen, auf welchem Port es lauschen soll
      PORT: 3000 
      # Umgebungsvariable für die API-URL, falls du sie nicht hardcoden willst
      PUBLIC_API_URL: http://localhost:8080/api 
    networks:
      - incognicloud-network

networks:
  incognicloud-network:
    driver: bridge